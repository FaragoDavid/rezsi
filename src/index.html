<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezsi - Secure Auth App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div id="login-section" class="section">
        <div class="card">
          <h1>Welcome to Rezsi</h1>
          <button id="google-signin-button" class="btn google-btn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 18 18"
              style="margin-right: 8px"
            >
              <path
                fill="#4285F4"
                d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
              />
              <path
                fill="#34A853"
                d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
              />
              <path
                fill="#FBBC05"
                d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"
              />
              <path
                fill="#EA4335"
                d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              />
            </svg>
            Sign in with Google
          </button>
        </div>
      </div>

      <div id="user-section" class="section hidden">
        <div class="card">
          <div class="data-section">
            <h2>Monthly Utility Usage</h2>
            <table id="utility-table">
              <thead>
                <tr>
                  <th id="date-header">Date</th>
                  <th id="water-header">Water</th>
                  <th id="gas-header">Gas</th>
                  <th id="electricity-header">Electricity</th>
                  <th id="electricity-main-header">Electricity (main)</th>
                </tr>
              </thead>
              <tbody id="utility-data">
                <tr>
                  <td colspan="5">Loading data...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
